<!DOCTYPE html>
<html ng-app="loginApp">
<head>
    <title>8. Login Form</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Back to Dashboard</a>
    <div ng-controller="loginCtrl" class="task-box">
        <h2>Login Form</h2>
        <form ng-submit="login()">
            Username: <input type="text" ng-model="username" required><br>
            Password: <input type="password" ng-model="password" required><br>
            <button type="submit">Login</button>
        </form>
        <p class="error-text" ng-show="msg">{{ msg }}</p>
    </div>
    <script>
        angular.module('loginApp', []).controller('loginCtrl', function ($scope) {
            $scope.login = function () {
                if ($scope.username === 'Ram' && $scope.password === '123') {
                    alert('Login successful'); $scope.msg = "";
                } else {
                    $scope.msg = "Login failed. Invalid credentials.";
                }
            };
        });
    </script>
</body>
</html>
