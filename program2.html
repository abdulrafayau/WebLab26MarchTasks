<!DOCTYPE html>
<html ng-app="shoppingApp">
<head>
    <title>2. Shopping List</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Back to Dashboard</a>
    <div ng-controller="shoppingCtrl" class="task-box">
        <h2>Shopping List</h2>
        <table>
            <tr ng-repeat="item in shoppingItems track by $index">
                <td>{{ item }}</td>
                <td style="width: 80px;"><button class="btn-danger" ng-click="removeItem($index)">Remove</button></td>
            </tr>
        </table>
        <input type="text" ng-model="newItem" placeholder="Add a new item">
        <button ng-click="addItem()">Add Item</button>
    </div>
    <script>
        angular.module('shoppingApp', []).controller('shoppingCtrl', function ($scope) {
            $scope.shoppingItems = ['Apples', 'Bananas', 'Bread', 'Milk'];
            $scope.addItem = function () {
                if ($scope.newItem) {
                    $scope.shoppingItems.push($scope.newItem);
                    $scope.newItem = ''; 
                }
            };
            $scope.removeItem = function (index) { $scope.shoppingItems.splice(index, 1); };
        });
    </script>
</body>
</html>
