<!DOCTYPE html>
<html ng-app="studentApp">
<head>
    <title>5. Student Details</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="index.html" class="back-link">← Back to Dashboard</a>
    <div ng-controller="studentCtrl" class="task-box">
        <h2>Student Details</h2>
        Name: <input type="text" ng-model="name">
        CGPA: <input type="number" ng-model="cgpa">
        <button ng-click="add()">Add Student</button>
        <p><strong>Total Students: {{ students.length }}</strong></p>
        <ul>
            <li ng-repeat="s in students">{{ s.name }} - CGPA: {{ s.cgpa }}</li>
        </ul>
    </div>
    <script>
        angular.module('studentApp', []).controller('studentCtrl', function ($scope) {
            $scope.students = [{name: 'Arun', cgpa: 9.5}, {name: 'Bhavana', cgpa: 9.6}];
            $scope.add = function () {
                if ($scope.name && $scope.cgpa) {
                    $scope.students.push({name: $scope.name, cgpa: $scope.cgpa});
                    $scope.name = ''; $scope.cgpa = '';
                }
            };
        });
    </script>
</body>
</html>
